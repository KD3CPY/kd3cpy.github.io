baseURL = 'https://kd3cpy.neocities.org/'
languageCode = 'en-us'
title = 'A Little Ham Radio Site'
theme = 'mana'

# =============================================================================
# Example: Single content folder, single language
# Content: content/posts/post.md (all content in one folder, no translations)
# See: https://gohugo.io/content-management/multilingual/
# =============================================================================

defaultContentLanguage = "en"

[pagination]
  pageSize = 10

[markup]
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 6
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true
        title = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    noClasses = false
    style = "catppuccin-macchiato"

# The section above is the place to start tweaking styles for light/dark functionality.

[outputs]
  home = ["HTML", "JSON"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  enableIntegrity = false
  relatedPostsCount = 3
  description = "A place to talk about amateur radio and tangentially related subjects"
  author = "KD3CPY"
  heroTitleLine1 = "A Little Ham Radio Site"
  heroTitleLine2 = "KD3CPY"
  footerText = "Built with Hugo and the Mana theme."

 #  [params.social]
 #    github = "https://github.com/KD3CPY"
 #    mastodon = "https://mastodon.radio/@KD3CPY"

  [params.buyMeACoffee]
    enabled = false
    id = "yourwidgetid"

[params.avatar]
  [params.avatar.home]
    url = "images/International_amateur_radio_symbol-240x480.png"
  [params.avatar.about]
# I AM COMPLETELY UNABLE TO GET ANYTHING TO WORK
#    url = "images/logo.png"

  [params.codeHighlight]
    darkTheme = "catppuccin-macchiato"
    lightTheme = "catppuccin-frappe"

  [params.copyright]
   # Remove the comment in 2027 to get the date range
   # startYear = 2026
    owner = "KD3CPY"

  [params.admonitions]
    alertStyle = "favicon"

# Single language: use root-level menus. No [languages] block needed.
[[menus.main]]
  name = "Home"
  pageRef = "/"
  weight = 10

[[menus.main]]
  name = "Posts"
  pageRef = "/posts"
  weight = 20

[[menus.main]]
  name = "Tags"
  pageRef = "/tags"
  weight = 30

[[menus.main]]
  name = "About"
  url = "/about/"
  weight = 40

# Added for GitHub Pages

[caches]
  [caches.images]
    dir = ':cacheDir/images'

# Added for RSS feed

[outputs]
  home = ['html', 'rss']
  section = ['html', 'rss']
  taxonomy = ['html']
  term = ['html']

[services]
  [services.rss]
    limit = 42

[params]
  [params.author]
    name = 'KD3CPY'
